devices: (
{
    name: "M720 Triathlon Multi-Device Mouse";
    dpi: 1000;

    buttons: (
        // Boton del pulgar (Gesture button)
        {
            cid: 0xd0;
            action =
            {
                type: "Gestures";
                gestures: (
                    {
                        direction: "Up";
                        mode: "OnRelease";
                        action = {
                            type: "Keypress";
                            keys: ["KEY_PLAYPAUSE"];
                        };
                    },
                    {
                        direction: "Down";
                        mode: "OnRelease";
                        action = {
                            type: "Keypress";
                            keys: ["KEY_MUTE"];
                        };
                    },
                    {
                        direction: "Left";
                        mode: "OnRelease";
                        action = {
                            type: "Keypress";
                            keys: ["KEY_LEFTMETA", "KEY_LEFT"];
                        };
                    },
                    {
                        direction: "Right";
                        mode: "OnRelease";
                        action = {
                            type: "Keypress";
                            keys: ["KEY_LEFTMETA", "KEY_RIGHT"];
                        };
                    },
                    {
                        direction: "None";
                        mode: "OnRelease";
                        action = {
                            type: "Keypress";
                            keys: ["KEY_LEFTMETA"];
                        };
                    }
                );
            };
        },

        // Click central de la rueda: Captura de pantalla (PrintScreen)
        {
            cid: 0x52;
            action = {
                type: "Keypress";
                keys: ["KEY_PRINT"];
            };
        },

        // Rueda inclinacion izquierda (Tilt Left): Copiar (Ctrl + C)
        {
            cid: 0x5b;
            action = {
                type: "Keypress";
                keys: ["KEY_LEFTCTRL", "KEY_C"];
            };
        },

        // Rueda inclinacion derecha (Tilt Right): Pegar (Ctrl + V)
        {
            cid: 0x5d;
            action = {
                type: "Keypress";
                keys: ["KEY_LEFTCTRL", "KEY_V"];
            };
        }
    );
}
);
